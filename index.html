<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KV Logo Cinematic Reveal</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

#logo-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  text-align: center;
  opacity: 0;
  animation: zoomIn 4s forwards 3s;
}

#kv-logo-img {
  width: 320px;
  filter: drop-shadow(0 0 40px #00ffff88);
  opacity: 0;
  transform: scale(0.5);
  animation: logoPop 2.5s ease forwards 3.5s;
}

#motto {
  font-size: 24px;
  color: #ffd700;
  margin-top: 20px;
  opacity: 0;
  animation: fadeIn 2s forwards 6s;
  text-shadow: 0 0 10px #00ffff;
}

/* Animations */
@keyframes zoomIn {
  from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

@keyframes logoPop {
  0% { opacity: 0; transform: scale(0.5) translateY(50px); }
  50% { opacity: 1; transform: scale(1.1) translateY(-10px); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div id="logo-container">
  <img 
    id="kv-logo-img"
    src="https://seeklogo.com/images/K/kendriya-vidyalaya-sangathan-logo-7E6F0E0E0E-seeklogo.com.png"
    onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/1/1d/Kendriya_Vidyalaya_Family_Logo.png';"
  />
  <div id="motto">
    तत् त्वं पूषन् अपावृणु<br>
    केन्द्रीय विद्यालय संगठन
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// PARTICLES
let particles = [];
const count = 180;

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = Math.random() * 0.6 - 0.3;
    this.speedY = Math.random() * 0.6 - 0.3;
    this.color = `hsl(${Math.random()*60 + 180}, 100%, ${Math.random()*40 + 60}%)`;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }

  draw() {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < count; i++) {
  particles.push(new Particle());
}

// ANIMATION
let time = 0;

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  time += 0.016;

  // ENERGY LINES
  if (time > 1.5 && time < 4) {
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 2;

    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(
        canvas.width/2 + Math.sin(time*5 + i)*200,
        canvas.height/2 + Math.cos(time*5 + i)*200
      );
      ctx.lineTo(canvas.width/2, canvas.height/2);
      ctx.stroke();
    }
  }

  // GLITCH EFFECT
  if (time > 3 && time < 3.8) {
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(
      Math.random()*canvas.width,
      Math.random()*canvas.height,
      80,
      15
    );
  }

  // ENERGY WAVE
  if (time > 5) {
    ctx.globalAlpha = 0.3 * (Math.sin(time*2) + 1)/2;
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, (time-5)*80, 0, Math.PI*2);
    ctx.stroke();
  }

  requestAnimationFrame(animate);
}

animate();

// FLASH EFFECT
setTimeout(() => {
  ctx.globalAlpha = 0.8;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  setTimeout(() => {
    ctx.globalAlpha = 0;
  }, 200);
}, 4000);

</script>

</body>
</html>
