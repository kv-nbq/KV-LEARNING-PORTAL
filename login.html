<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KV MCQ Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .bg-glow { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
        .loader { border-top-color: #6366f1; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-glow flex items-center justify-center p-6">

    <div id="loading-overlay" class="fixed inset-0 bg-[#020617] z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="loader w-12 h-12 border-4 border-slate-800 rounded-full mb-4"></div>
        <p class="text-indigo-400 font-bold tracking-widest uppercase text-xs">Syncing Terminal...</p>
    </div>

    <div class="glass-card p-10 md:p-14 rounded-[3rem] max-w-md w-full text-center shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
        
        <div class="mb-8">
            <h1 class="text-4xl font-black tracking-tighter mb-2">Welcome <span class="text-indigo-500">Back</span></h1>
            <p class="text-slate-400 text-sm">Continue your journey to academic excellence.</p>
        </div>

        <div id="auth-container" class="space-y-4">
            <button id="google-login-btn" class="w-full py-4 bg-white text-slate-900 rounded-2xl font-extrabold hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 shadow-xl">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5">
                Continue with Google
            </button>
            
            <a href="index.html" class="block text-xs font-bold text-slate-500 hover:text-indigo-400 transition-colors uppercase tracking-widest mt-6">
                ← Back to Home
            </a>
        </div>

        <p id="error-msg" class="mt-6 text-red-400 text-xs font-bold hidden bg-red-400/10 p-3 rounded-xl border border-red-400/20"></p>
    </div>

    <script type="module" src="./js/auth-logic.js"></script>
</body>
</html>
