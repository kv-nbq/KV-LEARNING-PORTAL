<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Leaderboard | KV MCQ Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #050505; 
            color: white; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-yellow { background: rgba(234, 179, 8, 0.08); backdrop-filter: blur(12px); border: 1px solid rgba(234, 179, 8, 0.2); }
        
        .bar-kv { background: linear-gradient(to top, #84cc16, #d9f99d); transition: height 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 20px rgba(132, 204, 22, 0.2); }
        .bar-nonkv { background: linear-gradient(to top, #eab308, #fef08a); transition: height 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 20px rgba(234, 179, 8, 0.2); }
        
        .my-row { border-left: 4px solid #84cc16 !important; background: rgba(132, 204, 22, 0.08); }
        .row-top { border-left: 4px solid #eab308; }

        .rank-list-img { width: 24px; height: 24px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .no-wrap { white-space: nowrap; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 mb-10">
        <h1 class="text-lg md:text-xl font-black italic uppercase tracking-tighter text-center sm:text-left">
            NATIONAL_LEVEL <span class="text-lime-500">LEADERBOARD</span>
        </h1>
        <button onclick="location.href='dashboard.html'" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition w-full sm:w-auto">
            Back to Dashboard
        </button>
    </nav>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6 md:gap-8">
        
        <div class="lg:col-span-1">
            <div class="glass-yellow p-8 rounded-[2rem] md:rounded-[2.5rem] sticky top-8">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-yellow-500 mb-10 text-center">KV vs PRIVATE PERFORMANCE</h3>
                
                <div class="flex items-end justify-center gap-12 h-64 md:h-80" id="comparison-bars"></div>

                <div class="flex justify-between mt-8 px-2 text-[10px] font-black uppercase">
                    <div class="flex flex-col items-center gap-1">
                        <span class="w-3 h-3 rounded-full bg-lime-500"></span>
                        <span class="text-lime-400">KV Scholars</span>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                        <span class="text-yellow-400">Private</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div class="glass rounded-[2rem] md:rounded-[2.5rem] overflow-hidden">
                <div class="overflow-x-auto scroll-smooth">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead class="bg-white/5">
                            <tr class="text-[10px] uppercase text-slate-400 font-black">
                                <th class="p-4 md:p-6">Rank & Student</th>
                                <th class="p-4 md:p-6">Achievement Badge</th>
                                <th class="p-4 md:p-6 text-center">Class</th>
                                <th class="p-4 md:p-6">School & City</th>
                                <th class="p-4 md:p-6 text-right">Total Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';

        // Updated Badge Logic including VEER TIER
        function getBadgeInfo(score) {
            if (score >= 200) {
                return { name: 'VEER', img: 'v.png', color: 'text-orange-500 font-extrabold' };
            } else if (score >= 125) {
                return { name: 'Pro', img: 'pr.png', color: 'text-sky-300' };
            } else if (score >= 75) {
                return { name: 'Excellent', img: 'e.png', color: 'text-sky-400' };
            } else if (score >= 35) {
                return { name: 'Good', img: 'g.png', color: 'text-blue-400' };
            } else if (score >= 10) {
                return { name: 'Beginner', img: 'be.png', color: 'text-slate-400' };
            } else {
                return { name: 'Poor', img: 'p.png', color: 'text-red-500' };
            }
        }

        async function updateLeaderboard() {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                const currentUserEmail = user?.email;

                const { data: results, error } = await supabase.from('test_results').select('*');
                if (error) throw error;

                const studentStats = {};
                let kvScoreSum = 0;
                let nonKvScoreSum = 0;

                results.forEach(row => {
                    const email = row.student_email;
                    if (!email) return;
                    
                    if (!studentStats[email]) {
                        studentStats[email] = { 
                            name: row.student_name || 'Anonymous', 
                            school: row.school_name || 'Unknown School', 
                            city: row.city || 'N/A', 
                            region: row.region || 'N/A', 
                            class: row.class_name || 'N/A',
                            total_score: 0, 
                            isKV: (row.school_name || '').toUpperCase().includes('KV'),
                            email: email
                        };
                    } else if (row.student_name) {
                        studentStats[email].name = row.student_name;
                    }
                    
                    const score = row.score || 0;
                    studentStats[email].total_score += score;

                    if (studentStats[email].isKV) kvScoreSum += score;
                    else nonKvScoreSum += score;
                });

                const sortedList = Object.values(studentStats).sort((a, b) => b.total_score - a.total_score);
                const leaderboardBody = document.getElementById('leaderboard-body');
                leaderboardBody.innerHTML = '';

                sortedList.forEach((student, index) => {
                    const isMe = student.email === currentUserEmail;
                    const badge = getBadgeInfo(student.total_score);
                    const isTopThree = index < 3;

                    leaderboardBody.innerHTML += `
                        <tr class="hover:bg-white/[0.03] transition-all duration-300 ${isMe ? 'my-row' : ''} ${isTopThree && !isMe ? 'row-top' : ''}">
                            <td class="p-4 md:p-6 no-wrap">
                                <div class="flex items-center gap-3 md:gap-4">
                                    <span class="text-xs font-black ${isTopThree ? 'text-yellow-500' : 'text-slate-600'}">#${index + 1}</span>
                                    <div>
                                        <div class="text-sm font-bold ${isMe ? 'text-lime-400' : 'text-white'}">
                                            ${student.name} ${isMe ? '<span class="text-[7px] ml-1 bg-lime-500/20 px-2 py-0.5 rounded-full border border-lime-500/30">YOU</span>' : ''}
                                        </div>
                                        <div class="text-[9px] text-slate-500 font-bold">${student.isKV ? 'KV SCHOLAR' : 'PRIVATE SCHOLAR'}</div>
                                    </div>
                                </div>
                            </td>
                            <td class="p-4 md:p-6">
                                <div class="flex items-center gap-2">
                                    <img src="${badge.img}" class="rank-list-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1152/1152912.png'">
                                    <span class="text-[10px] font-black uppercase tracking-widest ${badge.color}">${badge.name}</span>
                                </div>
                            </td>
                            <td class="p-4 md:p-6 text-center">
                                <span class="bg-white/5 px-3 py-1 rounded-lg text-[10px] font-black text-slate-300 border border-white/10">
                                    CLASS ${student.class}
                                </span>
                            </td>
                            <td class="p-4 md:p-6 no-wrap">
                                <div class="text-[10px] font-black uppercase text-slate-300 truncate max-w-[150px] md:max-w-none">${student.school}</div>
                                <div class="text-[9px] text-slate-500 capitalize">${student.city}</div>
                            </td>
                            <td class="p-4 md:p-6 text-right no-wrap">
                                <div class="text-lg font-black ${isTopThree ? 'text-yellow-400' : 'text-white'} tracking-tighter">${student.total_score}</div>
                            </td>
                        </tr>
                    `;
                });

                // Update Bar Graph
                const maxVal = Math.max(kvScoreSum, nonKvScoreSum, 1);
                const kvPct = (kvScoreSum / maxVal) * 100;
                const nonKvPct = (nonKvScoreSum / maxVal) * 100;

                const barsContainer = document.getElementById('comparison-bars');
                barsContainer.innerHTML = `
                    <div class="flex flex-col items-center h-full justify-end group">
                        <span class="text-xs font-black text-lime-400 mb-3 opacity-0 group-hover:opacity-100 transition-opacity">${kvScoreSum.toLocaleString()}</span>
                        <div id="bar-kv" class="w-14 md:w-16 bar-kv rounded-t-2xl relative" style="height: 0%">
                            <div class="absolute inset-0 bg-white/20 rounded-t-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                    </div>
                    <div class="flex flex-col items-center h-full justify-end group">
                        <span class="text-xs font-black text-yellow-400 mb-3 opacity-0 group-hover:opacity-100 transition-opacity">${nonKvScoreSum.toLocaleString()}</span>
                        <div id="bar-nonkv" class="w-14 md:w-16 bar-nonkv rounded-t-2xl relative" style="height: 0%">
                            <div class="absolute inset-0 bg-white/20 rounded-t-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    if(document.getElementById('bar-kv')) document.getElementById('bar-kv').style.height = kvPct + '%';
                    if(document.getElementById('bar-nonkv')) document.getElementById('bar-nonkv').style.height = nonKvPct + '%';
                }, 150);

            } catch (err) {
                console.error("Leaderboard Error:", err);
            }
        }

        updateLeaderboard();
        
        supabase.channel('leaderboard-live')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'test_results' }, updateLeaderboard)
            .subscribe();
    </script>
</body>
</html>
