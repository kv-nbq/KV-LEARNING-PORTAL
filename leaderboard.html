<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar Leaderboard | KV MCQ Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; min-height: 100vh; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-yellow { background: rgba(234, 179, 8, 0.08); backdrop-filter: blur(12px); border: 1px solid rgba(234, 179, 8, 0.2); }
        .glass-lime { background: rgba(132, 204, 22, 0.08); backdrop-filter: blur(12px); border: 1px solid rgba(132, 204, 22, 0.2); }
        
        .bar-kv { background: linear-gradient(to top, #84cc16, #d9f99d); transition: height 1.5s ease; }
        .bar-nonkv { background: linear-gradient(to top, #eab308, #fef08a); transition: height 1.5s ease; }
        
        /* Highlight for current user */
        .my-row { border-left: 4px solid #84cc16 !important; background: rgba(132, 204, 22, 0.05); }
        .row-top { border-left: 4px solid #eab308; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-xl font-black italic uppercase tracking-tighter">NATIONAL_LEVEL <span class="text-lime-500">LEADERBOARD</span></h1>
        <button onclick="location.href='dashboard.html'" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">Back to Dashboard</button>
    </nav>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="lg:col-span-1 space-y-6">
            <div class="glass-yellow p-6 rounded-[2.5rem]">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-yellow-500 mb-8 text-center">PERFORMANCE METRIC</h3>
                <div class="flex items-end justify-center gap-10 h-40" id="comparison-bars"></div>
                <div class="flex justify-between mt-4 px-2 text-[9px] font-black uppercase">
                    <span class="text-lime-400">KV Scholars</span>
                    <span class="text-yellow-400">Private</span>
                </div>
            </div>
            <div class="glass-lime p-6 rounded-[2.5rem]">
                <p class="text-[10px] font-black text-lime-500 uppercase mb-1">Global Correct Answers</p>
                <h2 id="total-correct" class="text-4xl font-black italic text-lime-400">0</h2>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div class="glass rounded-[2.5rem] overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/5">
                        <tr class="text-[10px] uppercase text-slate-400 font-black">
                            <th class="p-6">Rank & Student</th>
                            <th class="p-6">School</th>
                            <th class="p-6">Region</th>
                            <th class="p-6 text-right">Score</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';

        async function updateLeaderboard() {
            // Get current user to highlight them
            const { data: { user } } = await supabase.auth.getUser();
            const currentUserEmail = user?.email;

            const { data: results, error } = await supabase.from('test_results').select('*');
            if (error) return;

            const leaderboardBody = document.getElementById('leaderboard-body');
            const studentStats = {};

            // Aggregate data
            results.forEach(row => {
                const email = row.student_email;
                if (!email) return;
                
                // Logic: Only update name if it exists, otherwise keep it
                if (!studentStats[email]) {
                    studentStats[email] = { 
                        name: row.student_name, school: row.school_name, city: row.city, 
                        region: row.region, class: row.class_name, total_score: 0, total_correct: 0,
                        isKV: (row.school_name || '').toUpperCase().includes('KV'),
                        email: email
                    };
                } else if (row.student_name) {
                    // Update name in real-time if a newer row provides a different/updated name
                    studentStats[email].name = row.student_name;
                }
                
                studentStats[email].total_score += (row.score || 0);
                studentStats[email].total_correct += (row.correct_answers || 0);
            });

            const sortedList = Object.values(studentStats).sort((a, b) => b.total_score - a.total_score);
            let kvScoreSum = 0, nonKvScoreSum = 0, globalCorrect = 0;

            leaderboardBody.innerHTML = '';
            sortedList.forEach((student, index) => {
                if (student.isKV) kvScoreSum += student.total_score;
                else nonKvScoreSum += student.total_score;
                globalCorrect += student.total_correct;

                const isMe = student.email === currentUserEmail;
                const isTopThree = index < 3;

                leaderboardBody.innerHTML += `
                    <tr class="hover:bg-white/[0.03] transition ${isMe ? 'my-row' : ''} ${isTopThree && !isMe ? 'row-top' : ''}">
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <span class="text-xs font-black ${isTopThree ? 'text-yellow-500' : 'text-slate-600'}">#${index + 1}</span>
                                <div>
                                    <div class="text-sm font-bold ${isMe ? 'text-lime-400' : 'text-white'}">${student.name} ${isMe ? '<span class="text-[8px] ml-2 bg-lime-500/20 px-2 py-0.5 rounded-full">(YOU)</span>' : ''}</div>
                                    <div class="text-[9px] text-slate-500">${student.isKV ? 'KV SCHOLAR' : 'PRIVATE SCHOLAR'}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="text-[10px] font-black uppercase text-slate-300">${student.school}</div>
                            <div class="text-[9px] text-slate-500">${student.city}</div>
                        </td>
                        <td class="p-6 text-[10px] font-bold text-slate-400">${student.region}</td>
                        <td class="p-6 text-right">
                            <div class="text-lg font-black ${isTopThree ? 'text-yellow-400' : 'text-white'}">${student.total_score}</div>
                        </td>
                    </tr>
                `;
            });

            const maxVal = Math.max(kvScoreSum, nonKvScoreSum, 1);
            document.getElementById('comparison-bars').innerHTML = `
                <div class="w-12 bar-kv rounded-t-xl" style="height: ${(kvScoreSum/maxVal)*100}%"></div>
                <div class="w-12 bar-nonkv rounded-t-xl" style="height: ${(nonKvScoreSum/maxVal)*100}%"></div>
            `;
            document.getElementById('total-correct').innerText = globalCorrect.toLocaleString();
        }

        updateLeaderboard();
        
        // Listen for changes
        supabase.channel('leaderboard-live')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'test_results' }, updateLeaderboard)
            .subscribe();
    </script>
</body>
</html>
