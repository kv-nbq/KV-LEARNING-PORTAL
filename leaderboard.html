<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar Leaderboard | KV MCQ portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: white; 
            min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .bar-kv { background: #6366f1; transition: height 1s ease-in-out; }
        .bar-nonkv { background: #ec4899; transition: height 1s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-xl font-black italic uppercase tracking-tighter">NATIONAL_LEVEL_<span class="text-indigo-500">LEADERBOARD</span></h1>
        <button onclick="location.href='dashboard.html'" class="glass px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">Back to Dashboard</button>
    </nav>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="glass p-6 rounded-[2.5rem]">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-8 text-center">KV vs PRIVATE PERFORMANCE</h3>
                <div class="flex items-end justify-center gap-10 h-40" id="comparison-bars">
                    </div>
                <div class="flex justify-between mt-4 px-2 text-[9px] font-black uppercase">
                    <span class="text-indigo-400">KV Students</span>
                    <span class="text-pink-400">Non-KV</span>
                </div>
            </div>

            <div class="glass p-6 rounded-[2.5rem] border-l-4 border-indigo-500">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Global Correct Answers</p>
                <h2 id="total-correct" class="text-3xl font-black italic">0</h2>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div class="glass rounded-[2.5rem] overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-[10px] uppercase text-slate-500 font-black border-b border-white/5 bg-white/5">
                                <th class="p-6">Rank & Student</th>
                                <th class="p-6">School & Location</th>
                                <th class="p-6">Region / Class</th>
                                <th class="p-6 text-right">Correct / Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-white/5">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';

        async function updateLeaderboard() {
            // Fetching raw data from your 'test_results' table based on your image columns
            const { data: results, error } = await supabase
                .from('test_results')
                .select('*');

            if (error) {
                console.error("Database Error:", error);
                return;
            }

            const leaderboardBody = document.getElementById('leaderboard-body');
            const studentStats = {};

            // Processing data according to your criteria
            results.forEach(row => {
                const email = row.student_email;
                if (!email) return;

                if (!studentStats[email]) {
                    studentStats[email] = {
                        name: row.student_name || 'Scholar',
                        school: row.school_name || 'PRIVATE/OTHER',
                        city: row.city || 'N/A',
                        state: row.state || 'N/A',
                        region: row.region || 'N/A',
                        class: row.class_name || 'N/A',
                        total_score: 0,
                        total_correct: 0,
                        isKV: (row.school_name || '').toUpperCase().includes('KV') || (row.school_name || '').toUpperCase().includes('KENDRIYA')
                    };
                }

                studentStats[email].total_score += (row.score || 0);
                studentStats[email].total_correct += (row.correct_answers || 0);
            });

            // Sorting by score
            const sortedList = Object.values(studentStats).sort((a, b) => b.total_score - a.total_score);

            let kvScoreSum = 0;
            let nonKvScoreSum = 0;
            let globalCorrect = 0;

            leaderboardBody.innerHTML = '';
            sortedList.forEach((student, index) => {
                if (student.isKV) kvScoreSum += student.total_score;
                else nonKvScoreSum += student.total_score;
                globalCorrect += student.total_correct;

                leaderboardBody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition">
                        <td class="p-6">
                            <div class="flex items-center gap-4">
                                <span class="text-xs font-black text-slate-600">#${index + 1}</span>
                                <div>
                                    <div class="text-sm font-bold text-white">${student.name}</div>
                                    <div class="text-[10px] text-slate-500 font-medium">${student.email}</div>
                                </div>
                            </div>
                        </td>
                        <td class="p-6">
                            <div class="text-[10px] font-black ${student.isKV ? 'text-indigo-400' : 'text-pink-400'} uppercase tracking-wide">
                                ${student.school}
                            </div>
                            <div class="text-[9px] text-slate-500 uppercase font-bold">${student.city}, ${student.state}</div>
                        </td>
                        <td class="p-6">
                            <div class="text-[10px] font-black text-white uppercase">${student.region}</div>
                            <div class="text-[9px] text-slate-500 uppercase font-bold">Class ${student.class}</div>
                        </td>
                        <td class="p-6 text-right">
                            <div class="text-lg font-black text-white">${student.total_score}</div>
                            <div class="text-[8px] font-black text-emerald-500 uppercase">${student.total_correct} Correct Ans</div>
                        </td>
                    </tr>
                `;
            });

            // Render the Bar Graph Comparison
            const maxVal = Math.max(kvScoreSum, nonKvScoreSum, 1);
            document.getElementById('comparison-bars').innerHTML = `
                <div class="w-12 bar-kv rounded-t-xl" style="height: ${(kvScoreSum/maxVal)*100}%"></div>
                <div class="w-12 bar-nonkv rounded-t-xl" style="height: ${(nonKvScoreSum/maxVal)*100}%"></div>
            `;
            document.getElementById('total-correct').innerText = globalCorrect.toLocaleString();
        }

        // Initialize and setup real-time listener
        updateLeaderboard();
        supabase.channel('leaderboard-live')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'test_results' }, updateLeaderboard)
            .subscribe();
    </script>
</body>
</html>
