<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Test | KV MCQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #1e1b4b 0%, #020617 50%, #064e3b 100%);
            color: white; 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Blobs for that Pink/Green/Blue feel */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(to right, #ec4899, #8b5cf6, #10b981);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* Glassmorphism Card */
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Neon Buttons with Gradient */
        .btn-gradient { 
            background: linear-gradient(90deg, #ec4899, #6366f1, #10b981);
            color: white; 
            font-weight: 800; 
            padding: 1rem 2rem; 
            border-radius: 1rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase; 
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-gradient:hover:not(.pointer-events-none) { 
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        .option-btn { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 1rem 1.5rem; 
            border-radius: 1.2rem; 
            text-align: left; 
            transition: all 0.2s ease;
            width: 100%; 
            display: flex; 
            align-items: center; 
            gap: 1rem; 
        }

        .option-btn:hover { 
            background: rgba(255, 255, 255, 0.08); 
            border-color: #10b981;
            transform: translateY(-2px);
        }

        .option-btn.selected { 
            background: linear-gradient(90deg, #6366f1, #10b981) !important; 
            border-color: transparent;
            font-weight: bold;
        }

        .selection-chip { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 1.5rem 1rem; 
            border-radius: 1.2rem; 
            cursor: pointer; 
            transition: 0.3s; 
            text-align: center; 
            font-weight: 700;
        }

        .selection-chip:hover { 
            background: rgba(255, 255, 255, 0.1);
            border-color: #ec4899;
            box-shadow: 0 10px 20px -10px #ec4899;
        }

        .loader-ring { 
            width: 50px; height: 50px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: #ec4899; 
            border-radius: 50%; 
            animation: rotation 1s linear infinite; 
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .glass-card { padding: 1.5rem !important; border-radius: 1.5rem; }
            h1 { font-size: 1.8rem !important; }
            #question-text { font-size: 1.25rem !important; }
        }
    </style>
</head>
<body>
    <div class="blob"></div>

    <div id="upload-overlay" class="fixed inset-0 bg-[#020617]/95 z-[100] flex flex-col items-center justify-center hidden">
        <span class="loader-ring mb-4"></span>
        <h2 class="text-white font-bold tracking-widest uppercase animate-pulse">Syncing Cloud...</h2>
    </div>

    <div id="progress-container" class="fixed top-0 left-0 w-full h-1 bg-white/10 z-50 hidden">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-pink-500 via-indigo-500 to-emerald-500 transition-all duration-500" style="width: 0%"></div>
    </div>

    <div class="w-full max-w-5xl px-4 md:px-0">
        <div id="test-header" class="flex justify-between items-center mb-4 px-2 hidden">
            <div class="flex items-center gap-2">
                <span class="px-3 py-1 rounded-full bg-white/10 text-[10px] font-black uppercase tracking-widest" id="question-count">Phase 0/0</span>
            </div>
            <div id="timer" class="text-emerald-400 font-mono font-bold bg-emerald-500/10 px-4 py-1 rounded-full border border-emerald-500/20">00:00</div>
        </div>

        <div class="glass-card p-8 md:p-14 min-h-[550px] flex flex-col justify-between">
            
            <div id="selection-view" class="space-y-8">
                <div class="text-center">
                    <h1 id="selection-title" class="text-3xl md:text-5xl font-extrabold uppercase tracking-tighter mb-4">
                        CHOOSE <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-indigo-500">SUBJECT</span>
                    </h1>
                    <p class="text-slate-400 text-sm">Select a category to initialize assessment.</p>
                </div>
                <div id="selection-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

                <div id="limit-view" class="hidden max-w-sm mx-auto space-y-6 text-center animate-in fade-in zoom-in duration-300">
                    <div class="bg-white/5 border border-white/10 p-8 rounded-3xl">
                        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400 mb-2">Available Database</p>
                        <div class="text-6xl font-black" id="max-qs-display">0</div>
                    </div>
                    <div class="space-y-3">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Question Quantity</label>
                        <input type="number" id="user-limit-input" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center text-3xl font-black outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                    </div>
                    <button id="start-session-btn" class="btn-gradient w-full">Begin Session</button>
                </div>
            </div>

            <div id="test-view" class="hidden animate-in slide-in-from-bottom-4 duration-500">
                <div id="question-text" class="text-xl md:text-3xl font-bold leading-snug mb-10 text-white">LOADING...</div>
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-6 mt-12 pt-8 border-t border-white/10">
                <button onclick="quitTest()" class="text-slate-500 hover:text-rose-400 transition-all font-bold text-[10px] tracking-widest uppercase">Abort_Mission</button>
                <button id="next-btn" class="btn-gradient w-full sm:w-auto opacity-50 pointer-events-none hidden">Next_Phase</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js';

        let allQuestions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let selectedSubject = "";
        let selectedChapter = "";
        let startTime = null;
        let timerInterval = null;

        window.quitTest = () => { 
            if(confirm("Abort session? Progress will not be saved.")) window.location.href = 'dashboard.html'; 
        };

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return window.location.href = 'index.html';

            const { data: profile } = await supabase.from('users').select('*').eq('id', user.id).single();
            if (!profile || !profile.profile_completed) return window.location.href = 'profile.html';

            const { data: fetched } = await supabase.from('questions').select('*').eq('class', profile.class);
            allQuestions = fetched || [];
            if (allQuestions.length === 0) window.location.href = 'dashboard.html';
            
            showSubjectSelection();
        }

        function showSubjectSelection() {
            const subjects = [...new Set(allQuestions.map(q => q.subject))].filter(Boolean);
            const grid = document.getElementById('selection-grid');
            grid.innerHTML = '';
            subjects.forEach(sub => {
                const btn = document.createElement('div');
                btn.className = 'selection-chip';
                btn.innerText = sub;
                btn.onclick = () => showChapterSelection(sub);
                grid.appendChild(btn);
            });
        }

        function showChapterSelection(subject) {
            selectedSubject = subject;
            document.getElementById('selection-title').innerHTML = `CHOOSE <span class="text-indigo-400">CHAPTER</span>`;
            const chapters = [...new Set(allQuestions.filter(q => q.subject === subject).map(q => q.chapter))].filter(Boolean);
            const grid = document.getElementById('selection-grid');
            grid.innerHTML = '';
            
            const backBtn = document.createElement('div');
            backBtn.className = 'selection-chip border-rose-500/30 text-rose-500';
            backBtn.innerText = "← Back";
            backBtn.onclick = () => {
                document.getElementById('selection-title').innerHTML = `CHOOSE <span class="text-pink-500">SUBJECT</span>`;
                showSubjectSelection();
            };
            grid.appendChild(backBtn);

            chapters.forEach(chap => {
                const btn = document.createElement('div');
                btn.className = 'selection-chip';
                btn.innerText = chap;
                btn.onclick = () => showLimitView(chap);
                grid.appendChild(btn);
            });
        }

        function showLimitView(chapter) {
            selectedChapter = chapter;
            const pool = allQuestions.filter(q => q.subject === selectedSubject && q.chapter === selectedChapter);
            document.getElementById('selection-grid').classList.add('hidden');
            document.getElementById('limit-view').classList.remove('hidden');
            document.getElementById('max-qs-display').innerText = pool.length;
            document.getElementById('user-limit-input').value = Math.min(pool.length, 10);
            document.getElementById('user-limit-input').max = pool.length;

            document.getElementById('start-session-btn').onclick = () => {
                let limit = parseInt(document.getElementById('user-limit-input').value) || 10;
                filteredQuestions = pool.sort(() => Math.random() - 0.5).slice(0, limit);
                startTest();
            };
        }

        function startTest() {
            document.getElementById('selection-view').classList.add('hidden');
            document.getElementById('test-view').classList.remove('hidden');
            document.getElementById('test-header').classList.remove('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            startTime = Date.now();
            startTimer();
            displayQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const secs = String(elapsed % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function displayQuestion() {
            const q = filteredQuestions[currentIndex];
            const nextBtn = document.getElementById('next-btn');
            const previouslyAnswered = userAnswers[q.id];
            
            nextBtn.classList.add('opacity-50', 'pointer-events-none');
            nextBtn.innerText = (currentIndex === filteredQuestions.length - 1) ? "Finalize Result" : "Next Phase";
            
            document.getElementById('question-count').innerText = `Phase ${currentIndex + 1} / ${filteredQuestions.length}`;
            document.getElementById('question-text').innerText = q.question_text;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            ['a', 'b', 'c', 'd'].forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (previouslyAnswered === key.toUpperCase() ? ' selected' : '');
                btn.innerHTML = `<span class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center border border-white/10 uppercase text-xs font-black">${key}</span><span>${q[`option_${key}`]}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    userAnswers[q.id] = key.toUpperCase();
                    nextBtn.classList.remove('opacity-50', 'pointer-events-none');
                };
                grid.appendChild(btn);
            });
            if (previouslyAnswered) nextBtn.classList.remove('opacity-50', 'pointer-events-none');
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / filteredQuestions.length) * 100}%`;
        }

        document.getElementById('next-btn').onclick = () => {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                displayQuestion();
            } else {
                finishAssessment();
            }
        };

        async function finishAssessment() {
            const overlay = document.getElementById('upload-overlay');
            overlay.classList.remove('hidden');
            clearInterval(timerInterval);
            const timeTaken = Math.floor((Date.now() - startTime) / 1000);
            let correct = 0, wrong = 0;
            
            filteredQuestions.forEach(q => {
                if (userAnswers[q.id] === q.correct_answer.toUpperCase()) correct++;
                else if (userAnswers[q.id]) wrong++; 
            });

            const score = (correct * 4) - (wrong * 1);
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                try {
                    const { data: u } = await supabase.from('users').select('*').eq('id', user.id).single();
                    const payload = {
                        student_id: user.id, student_email: user.email, student_name: u?.full_name || 'Anonymous',
                        subject: selectedSubject, chapter: selectedChapter, total_questions: filteredQuestions.length,
                        correct_answers: correct, wrong_answers: wrong, score: score,
                        percentage: Math.round((correct / filteredQuestions.length) * 100),
                        school_name: u?.school_name || 'N/A', city: u?.city || 'N/A', state: u?.state || 'N/A',
                        time_taken_seconds: timeTaken, class_name: u?.class || 'N/A',
                        region: u?.region || 'N/A', created_at: new Date().toISOString()
                    };
                    await supabase.from('test_results').insert([payload]);
                    await supabase.from('users').update({
                        total_points: (u?.total_points || 0) + score,
                        total_tests: (u?.total_tests || 0) + 1,
                        last_active: new Date().toISOString()
                    }).eq('id', user.id);
                } catch (err) { console.error(err); }
            }

            localStorage.setItem('activeTest', JSON.stringify({
                subject: selectedSubject, chapter: selectedChapter, questions: filteredQuestions,
                userAnswers: userAnswers, stats: { correct, wrong, score, time: timeTaken }
            }));
            window.location.href = 'results.html';
        }

        init();
    </script>
</body>
</html>
