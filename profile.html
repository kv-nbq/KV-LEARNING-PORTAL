<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings | KV MCQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-style { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.2s; }
        .input-style:focus { border-color: #6366f1; outline: none; background: rgba(255, 255, 255, 0.08); }
        /* Style for the locked email field */
        .input-readonly { background: rgba(255, 255, 255, 0.02); color: #64748b; cursor: not-allowed; border-style: dashed; }
        .kv-only { display: none; }
        .kv-only.show { display: block; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        input:not(#email) { text-transform: uppercase; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div id="loader" class="fixed inset-0 bg-[#020617] z-[100] flex flex-col items-center justify-center font-bold text-indigo-500 uppercase tracking-widest text-center">
        <div class="mb-4 animate-pulse">Syncing Profile...</div>
    </div>

    <div class="glass w-full max-w-xl rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative">
        <button onclick="location.href='dashboard.html'" class="absolute top-8 left-8 text-[10px] font-black uppercase text-slate-500 hover:text-white transition">
            ← Back
        </button>

        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold italic uppercase">Account <span class="text-indigo-500">Settings</span></h1>
            <p class="text-slate-400 text-sm mt-2">Personalize your scholar profile.</p>
        </header>

        <form id="profile-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1 flex justify-between">
                    Email Address <span>(Locked)</span>
                </label>
                <input type="email" id="email" class="input-style input-readonly w-full p-4 rounded-2xl font-bold" readonly>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">Full Name</label>
                    <input type="text" id="full_name" class="input-style w-full p-4 rounded-2xl font-semibold" placeholder="YOUR NAME" required>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">Current Class</label>
                    <select id="class" class="input-style w-full p-4 rounded-2xl font-bold cursor-pointer" required>
                        <option value="9">Class 9</option>
                        <option value="10" selected>Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-1">School Affiliation</label>
                <select id="school_type" class="input-style w-full p-4 rounded-2xl font-bold cursor-pointer" required>
                    <option value="non-kv">Non-KV / Guest Student</option>
                    <option value="kv">KV Student (PM Shri Kendriya Vidyalaya)</option>
                </select>
            </div>

            <div id="kv-section" class="kv-only space-y-4 pt-6 border-t border-white/10">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Full School Name</label>
                    <input type="text" id="school_name" class="input-style w-full p-4 rounded-2xl" placeholder="e.g. KV NO.1 AFS">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">KV Region</label>
                        <input type="text" id="region" placeholder="e.g. GUWAHATI" class="input-style w-full p-4 rounded-2xl">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">City</label>
                        <input type="text" id="city" placeholder="CITY" class="input-style w-full p-4 rounded-2xl">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">State / UT</label>
                    <input type="text" id="state" placeholder="STATE NAME" class="input-style w-full p-4 rounded-2xl">
                </div>
            </div>

            <button type="submit" id="save-btn" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-lg hover:bg-indigo-500 transition shadow-xl uppercase tracking-widest active:scale-95">
                Save & Update Profile
            </button>
        </form>
    </div>

<script type="module">
    import { supabase } from './js/supabase.js';

    const form = document.getElementById('profile-form');
    const schoolTypeSelect = document.getElementById('school_type');
    const kvSection = document.getElementById('kv-section');
    const btn = document.getElementById('save-btn');
    const emailInput = document.getElementById('email');

    const toggleKVFields = () => {
        const isKV = schoolTypeSelect.value === 'kv';
        kvSection.classList.toggle('show', isKV);
        document.querySelectorAll('#kv-section input').forEach(el => {
            el.required = isKV;
        });
    };

    schoolTypeSelect.onchange = toggleKVFields;

    async function loadProfile() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) return window.location.replace('index.html');

        emailInput.value = user.email;

        // Load data from users table
        const { data: dbData } = await supabase.from('users').select('*').eq('id', user.id).maybeSingle();

        if (dbData) {
            document.getElementById('full_name').value = dbData.full_name || '';
            document.getElementById('class').value = dbData.class || '10';
            schoolTypeSelect.value = dbData.school_type || 'non-kv';
            
            toggleKVFields();
            
            if (dbData.school_type === 'kv') {
                document.getElementById('school_name').value = dbData.school_name || '';
                document.getElementById('region').value = dbData.region || '';
                document.getElementById('city').value = dbData.city || '';
                document.getElementById('state').value = dbData.state || '';
            }
        }
        document.getElementById('loader').classList.add('hidden');
    }

    form.onsubmit = async (e) => {
        e.preventDefault();
        btn.innerText = "SYNCING TABLES...";
        btn.disabled = true;
        
        const { data: { user } } = await supabase.auth.getUser();
        const isKV = schoolTypeSelect.value === 'kv';
        
        // Data shared by BOTH tables
        const baseData = {
            id: user.id,
            email: user.email,
            full_name: document.getElementById('full_name').value.trim().toUpperCase(),
            class: document.getElementById('class').value,
            school_type: schoolTypeSelect.value,
            school_name: isKV ? document.getElementById('school_name').value.trim().toUpperCase() : "PRIVATE/OTHER",
            region: isKV ? document.getElementById('region').value.trim().toUpperCase() : "N/A",
            city: isKV ? document.getElementById('city').value.trim().toUpperCase() : "N/A",
            state: isKV ? document.getElementById('state').value.trim().toUpperCase() : "N/A",
            profile_completed: true, // Forces column to turn TRUE in database
            updated_at: new Date().toISOString()
        };

        try {
            // 1. Update 'users' table
            const { error: userError } = await supabase
                .from('users')
                .upsert({
                    ...baseData,
                    is_kv_student: isKV
                });

            if (userError) throw userError;

            // 2. Update 'profiles' table
            const { error: profileError } = await supabase
                .from('profiles')
                .upsert(baseData);

            if (profileError) throw profileError;

            // SUCCESS
            window.location.href = 'dashboard.html';

        } catch (error) {
            console.error("Database Sync Error:", error.message);
            alert("Error syncing data: " + error.message);
            btn.innerText = "SAVE & UPDATE PROFILE";
            btn.disabled = false;
        }
    };

    loadProfile();
</script>
</body>
</html>
