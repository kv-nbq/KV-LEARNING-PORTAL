<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorecard | KV MCQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .history-btn { cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .history-btn:hover { background: rgba(99, 102, 241, 0.15); transform: translateY(-2px); border-color: rgba(99, 102, 241, 0.5); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-3xl mx-auto space-y-6">
        <div class="glass-card rounded-[2.5rem] p-8 text-center shadow-2xl border-t-4 border-indigo-500">
            <p id="res-subject" class="text-indigo-400 font-bold text-[10px] tracking-[0.3em] uppercase mb-2 italic">LOADING...</p>
            <h1 class="text-3xl font-black italic uppercase mb-6">Assessment <span class="text-indigo-500">Report</span></h1>
            
            <div class="inline-block p-8 border-4 border-indigo-500/20 rounded-full mb-8 bg-indigo-500/5 relative">
                <span id="res-score" class="text-6xl font-black italic">0</span>
                <p id="res-total-label" class="text-[10px] text-slate-500 font-bold uppercase">TOTAL POINTS</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Accuracy</p>
                    <p id="res-percent" class="text-xl font-black text-emerald-400">0%</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Total Qs</p>
                    <p id="res-total-qs" class="text-xl font-black text-white">0</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Correct (+4)</p>
                    <p id="res-correct" class="text-xl font-black text-indigo-400">0</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Wrong (-1)</p>
                    <p id="res-wrong" class="text-xl font-black text-rose-500">0</p>
                </div>
            </div>

            <button onclick="window.location.href='dashboard.html'" class="w-full bg-white text-black font-black py-4 rounded-xl hover:bg-indigo-600 hover:text-white transition uppercase text-xs tracking-widest">
                Continue to Dashboard
            </button>
        </div>

        <div class="glass-card rounded-2xl p-6">
            <h3 class="text-xs font-black uppercase text-slate-400 mb-4 italic tracking-widest">Recent History (Click to Review)</h3>
            <div id="history-list" class="space-y-3"></div>
        </div>
    </div>

    <div id="review-modal" class="modal">
        <div class="glass-card w-full max-w-xl max-h-[85vh] overflow-y-auto rounded-3xl p-6 relative">
            <button onclick="closeModal()" class="fixed md:absolute top-4 right-4 bg-rose-500 text-white w-8 h-8 rounded-full font-bold">×</button>
            <h2 id="modal-title" class="text-xl font-black italic mb-6 text-indigo-400 uppercase text-center">Test Review</h2>
            <div id="review-content" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase.js'; 

        async function startAnalysis() {
            try {
                const testData = JSON.parse(localStorage.getItem('activeTest'));
                const userAnswers = JSON.parse(localStorage.getItem('userAnswers')) || {};
                const startTime = localStorage.getItem('testStartTime');
                
                if (!testData) return;

                let correctCount = 0;
                let wrongCount = 0;
                let reviewData = [];

                // 1. Calculate Results with (+4 / -1) Logic
                testData.questions.forEach(q => {
                    const actualCorrect = q.answer || q.correct_answer || q.correct_option;
                    const studentChoice = userAnswers[q.id];
                    
                    if (studentChoice) {
                        const isCorrect = String(studentChoice).trim() === String(actualCorrect).trim();
                        if (isCorrect) {
                            correctCount++;
                        } else {
                            wrongCount++;
                        }
                        
                        reviewData.push({
                            question: q.question_text,
                            student: studentChoice,
                            correct: actualCorrect,
                            status: isCorrect ? 'correct' : 'wrong'
                        });
                    } else {
                        // Skipped questions
                        reviewData.push({
                            question: q.question_text,
                            student: "Skipped",
                            correct: actualCorrect,
                            status: 'skipped'
                        });
                    }
                });

                // Final Points Calculation
                const finalPoints = (correctCount * 4) - (wrongCount * 1);
                const totalQs = testData.questions.length;
                const accuracy = totalQs > 0 ? Math.round((correctCount / totalQs) * 100) : 0;

                // 2. Update UI
                document.getElementById('res-subject').innerText = `${testData.subject} • ${testData.chapter}`;
                document.getElementById('res-score').innerText = finalPoints;
                document.getElementById('res-total-qs').innerText = totalQs;
                document.getElementById('res-correct').innerText = correctCount;
                document.getElementById('res-wrong').innerText = wrongCount;
                document.getElementById('res-percent').innerText = accuracy + "%";

                // 3. Save to Local History
                let history = JSON.parse(localStorage.getItem('test_history') || '[]');
                const alreadySaved = history.find(h => h.startTime === startTime);
                
                if (!alreadySaved) {
                    const testEntry = { 
                        startTime: startTime,
                        subject: testData.subject, 
                        chapter: testData.chapter, 
                        points: finalPoints,
                        correct: correctCount,
                        total: totalQs, 
                        review: reviewData 
                    };
                    history.unshift(testEntry);
                    localStorage.setItem('test_history', JSON.stringify(history.slice(0, 15)));
                }

                renderHistory(history);

                // 4. Sync to Database
                if (!alreadySaved) {
                    const { data: { user } } = await supabase.auth.getUser();
                    if (user) {
                        await supabase.from('results').insert([{
                            user_id: user.id,
                            subject: testData.subject,
                            chapter: testData.chapter,
                            score: finalPoints, // Saving calculated points
                            total_questions: totalQs,
                            percentage: accuracy,
                            wrong_answers: wrongCount
                        }]);
                    }
                }
            } catch (err) { console.error(err); }
        }

        function renderHistory(history) {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map((item, index) => `
                <div onclick="openReview(${index})" class="p-4 rounded-xl flex justify-between items-center bg-white/5 history-btn">
                    <div>
                        <p class="text-[9px] text-indigo-400 font-bold uppercase tracking-tighter">${item.subject}</p>
                        <p class="text-xs font-bold">${item.chapter}</p>
                    </div>
                    <div class="text-right">
                        <div class="font-black italic text-lg text-indigo-400">${item.points} PTS</div>
                        <div class="text-[8px] text-slate-400 uppercase font-bold">${item.correct}/${item.total} Correct</div>
                    </div>
                </div>
            `).join('');
        }

        window.openReview = (index) => {
            const history = JSON.parse(localStorage.getItem('test_history'));
            const test = history[index];
            const content = document.getElementById('review-content');
            document.getElementById('modal-title').innerText = `${test.chapter} Review`;
            
            content.innerHTML = test.review.map((r, i) => `
                <div class="p-4 rounded-xl ${r.status === 'correct' ? 'bg-emerald-500/10 border border-emerald-500/20' : r.status === 'skipped' ? 'bg-slate-500/10 border border-slate-500/20' : 'bg-rose-500/10 border border-rose-500/20'}">
                    <p class="text-xs font-bold mb-2">Q${i+1}: ${r.question}</p>
                    <div class="grid grid-cols-2 gap-2 text-[10px] uppercase font-black">
                        <div class="${r.status === 'correct' ? 'text-emerald-400' : 'text-rose-400'}">You: ${r.student}</div>
                        <div class="text-indigo-400 text-right">Correct: ${r.correct}</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('review-modal').classList.add('active');
        };

        window.closeModal = () => document.getElementById('review-modal').classList.remove('active');

        startAnalysis();
    </script>
</body>
</html>
