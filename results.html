<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results | KV MCQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: white; min-height: 100vh; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .liquid-glass-modal { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        
        .stat-card { border-top: 4px solid #6366f1; }
        .correct-bg { background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16, 185, 129, 0.2); }
        .wrong-bg { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.2); }
        
        @keyframes float { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
        .balloon { position: fixed; width: 50px; height: 60px; border-radius: 50%; bottom: -100px; animation: float 4s ease-in forwards; z-index: 100; }
        
        @keyframes fall { 0% { transform: translateY(-10px) rotate(0deg); } 100% { transform: translateY(100vh) rotate(360deg); } }
        .confetti { position: fixed; top: -10px; width: 10px; height: 10px; animation: fall 3s linear forwards; z-index: 300; }
        
        @keyframes cry { 0% { transform: translateY(-50px); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }
        .crying-emoji { position: fixed; top: -50px; font-size: 30px; animation: cry 4s linear forwards; z-index: 50; }
        
        .cracker-flash { position: fixed; inset: 0; background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%); z-index: 200; animation: flash 1s ease-out forwards; }
        @keyframes flash { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        @media print {
            .no-print { display: none; }
            body { background: white !important; color: black !important; }
            .glass { border: 1px solid #eee; background: white; color: black; box-shadow: none; }
            .text-white, h4, h2, p { color: black !important; }
            .correct-bg { background: #f0fff4 !important; border: 1px solid #c6f6d5 !important; }
            .wrong-bg { background: #fff5f5 !important; border: 1px solid #fed7d7 !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="ai-modal" class="fixed inset-0 z-[1000] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeAIChat()"></div>
        <div class="liquid-glass-modal w-full max-w-lg h-[85vh] rounded-[2.5rem] p-8 flex flex-col relative animate-in fade-in zoom-in duration-300 border border-indigo-500/30">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                    <h3 class="font-black text-indigo-400 uppercase tracking-widest text-[10px]">Neural Intelligence Analyst</h3>
                </div>
                <button onclick="closeAIChat()" class="text-slate-400 hover:text-white transition-colors">✕</button>
            </div>
            <div id="ai-response-area" class="flex-1 overflow-y-auto space-y-6 text-sm text-slate-300 pr-2 leading-relaxed">
                <p class="animate-pulse italic">Connecting to neural core...</p>
            </div>
        </div>
    </div>

    <div id="animation-layer"></div>

    <div id="sync-loader" class="fixed inset-0 bg-[#020617] z-50 flex flex-col items-center justify-center text-center">
        <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-indigo-400 font-black uppercase tracking-widest text-[10px]">Processing Results...</p>
    </div>

    <main id="main-content" class="max-w-4xl mx-auto hidden">
        <header class="text-center mb-8">
            <h1 id="user-display-name" class="text-indigo-500 font-black uppercase tracking-widest text-sm mb-2 font-mono">STUDENT_REPORT</h1>
            <h2 class="text-5xl font-black italic uppercase tracking-tighter">Performance Analysis</h2>
            <div id="performance-feedback" class="mt-4 text-xl font-black uppercase tracking-widest animate-bounce"></div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-6 rounded-3xl stat-card text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Score Earned</p>
                <h4 id="res-score" class="text-3xl font-black text-white">0</h4>
            </div>
            <div class="glass p-6 rounded-3xl border-t-4 border-emerald-500 text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Correct</p>
                <h4 id="res-correct" class="text-3xl font-black text-emerald-400">0</h4>
            </div>
            <div class="glass p-6 rounded-3xl border-t-4 border-rose-500 text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Wrong</p>
                <h4 id="res-wrong" class="text-3xl font-black text-rose-400">0</h4>
            </div>
            <div class="glass p-6 rounded-3xl border-t-4 border-amber-500 text-center">
                <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Accuracy</p>
                <h4 id="res-accuracy" class="text-3xl font-black text-amber-400">0%</h4>
            </div>
        </div>

        <div class="glass p-4 rounded-2xl mb-8 flex flex-wrap justify-between items-center text-[10px] font-black uppercase tracking-widest text-slate-400">
            <div id="student-school">School: Loading...</div>
            <div id="res-subject-info">Subject: Loading...</div>
        </div>

        <div class="space-y-4" id="review-container">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 ml-2 mb-4">Detailed Question Analysis</h3>
        </div>

        <div class="mt-12 flex flex-col md:flex-row gap-4 no-print pb-12">
            <button onclick="location.href='dashboard.html'" class="flex-1 bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest hover:bg-indigo-500 transition-all shadow-lg active:scale-95">Back to Dashboard</button>
            <button onclick="openAIChat()" class="flex-1 bg-emerald-600 text-white font-black py-4 rounded-2xl uppercase tracking-widest hover:bg-emerald-500 transition-all shadow-lg active:scale-95">Analyze with AI Intelligence</button>
            <button onclick="window.print()" class="glass flex-1 text-white font-black py-4 rounded-2xl uppercase tracking-widest hover:bg-white/10 transition-all active:scale-95">Print / Save PDF</button>
        </div>
    </main>

    <script type="module">
        import { supabase } from './js/supabase.js';

        const motivations = [
            "Dekho beta, Sapne dekho, phir unhe sach karo", "Dekho beta, Mehnat kabhi waste nahi jaati", 
            "Dekho beta, Aaj ka struggle, kal ki success", "Dekho beta, Khud par believe rakho",

            "Dekho beta, Strong bano mentally", "Dekho beta, Khud se compete karo",
            "Dekho beta, Time sabse valuable hai", "Dekho beta, Comfort zone se bahar niklo",
            "Dekho beta, Risk lena seekho", "Dekho beta, Kaam bolta hai",
            "Dekho beta, Har din better bano", "Dekho beta, Negative logon se door raho",
            "Dekho beta, Effort kabhi bekaar nahi hota", "Dekho beta, Apni story khud likho",
            "Dekho beta, Jeetne wale rukte nahi", "Dekho beta, Learn karo har situation se",
            "Dekho beta, Fail ho, par try mat chhodo", "Dekho beta, Patience rakho",
            "Dekho beta, Growth time leti hai", "Dekho beta, Passion follow karo",
            "Dekho beta, Energy waste mat karo", "Dekho beta, Khud pe kaam karo",
            "Dekho beta, Smart work bhi zaroori hai", "Dekho beta, Har problem ka solution hota hai",
            "Dekho beta, Soch positive rakho", "Dekho beta, Life ek chance hai",
            "Dekho beta, Apna attitude strong rakho", "Dekho beta, Kal se nahi, aaj se start karo",
            "Dekho beta, Fear ko face karo", "Dekho beta, Har din ek opportunity hai",
            "Dekho beta, Jeet tumhari hogi", "Dekho beta, Apni value samjho",
            "Dekho beta, Plan banao aur follow karo", "Dekho beta, Lazy mat bano",
            "Dekho beta, Dreams ko serious lo", "Dekho beta, Khud ko prove karo",
            "Dekho beta, Time ke saath grow karo", "Dekho beta, Excuses weak banate hain",
            "Dekho beta, Success ka shortcut nahi hota", "Dekho beta, Action hi result deta hai",
            "Dekho beta, Apna target fix rakho", "Dekho beta, मेहनत = result",
            "Dekho beta, Risk lo warna regret hoga", "Dekho beta, हर दिन सीखो",
            "Dekho beta, Khud ko push karo", "Dekho beta, Failures se strong bano",
            "Dekho beta, Focus hata toh loss pakka", "Dekho beta, मेहनत ka फल milega",
            "Dekho beta, Mind control karo", "Dekho beta, Khud ko underestimate mat karo",
            "Dekho beta, Bada socho", "Dekho beta, Aage badhte raho",
            "Dekho beta, Compare mat karo", "Dekho beta, Believe hi power hai",
            "Dekho beta, Har din ek chance hai", "Dekho beta, Apni journey enjoy karo",
            "Dekho beta, मेहनत ka koi alternative nahi", "Dekho beta, Strong log kabhi rukte nahi",
            "Dekho beta, Time ko value do", "Dekho beta, Hard days = strong you",
            "Dekho beta, Apna best version bano", "Dekho beta, Learn, apply, repeat",
            "Dekho beta, Kal better hoga", "Dekho beta, Consistency jeet dilati hai",
            "Dekho beta, खुद को upgrade karo", "Dekho beta, जीत mindset se hoti hai",
            "Dekho beta, Sab possible hai", "Dekho beta, कोशिश karte raho",
            "Dekho beta, खुद pe भरोसा रखो", "Dekho beta, मेहनत se डरना नहीं",
            "Dekho beta, Success deserve karo", "Dekho beta, Har din grow karo",
            "Dekho beta, Action lena start karo", "Dekho beta, खुद ko strong banao",
            "Dekho beta, सपनों ke liye लड़ो", "Dekho beta, Tum unstoppable ho"
        ];

        window.openAIChat = async function() {
            document.getElementById('ai-modal').classList.remove('hidden');
            const container = document.getElementById('ai-response-area');
            const data = JSON.parse(localStorage.getItem('activeTest'));
            
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full space-y-4">
                    <div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-[10px] font-black tracking-[0.2em] text-indigo-400">ANALYZING CHAPTER: ${data.chapter.toUpperCase()}...</p>
                </div>
            `;

            setTimeout(() => {
                const accuracy = Math.round((data.stats.correct / data.questions.length) * 100);
                const randomMotive = motivations[Math.floor(Math.random() * motivations.length)];
                const isConceptual = /physics|chemistry|math|biology|science|accounts|eco/i.test(data.subject);
                
                let studyMethod = "";
                let summary = "";
                let typeTitle = isConceptual ? "Numerical/Conceptual Analysis" : "Theoretical Retention Analysis";

                // Dynamic Logic based on subject type and accuracy
                if(isConceptual) {
                    if(accuracy >= 80) {
                        summary = "You have achieved **Formula Mastery**. Your derivation logic is currently sharp.";
                        studyMethod = "Don't just solve; **Derive**. Re-derive the core formulas of this chapter without looking. Focus on speed by timing your next numerical session.";
                    } else {
                        summary = "You are likely facing **Logic Friction**. You know the formula but struggle with the application.";
                        studyMethod = "Focus on **Step-Analysis**. For every wrong answer, re-write the solution steps in your notes. Highlight the specific line where you made a calculation or logical error.";
                    }
                } else {
                    if(accuracy >= 80) {
                        summary = "Your **Conceptual Clarity** is excellent. You are retaining key definitions well.";
                        studyMethod = "Use the **Feynman Technique**. Teach this chapter to an imaginary student. If you can explain it simply, you've mastered it. Start using mind-maps for inter-topic connections.";
                    } else {
                        summary = "There are **Keyword Gaps** in your retention. You understand the topic but miss specific points.";
                        studyMethod = "Adopt **Active Recall**. Close your notes and write down everything you remember about ${data.chapter}. Match it with your book and fill the gaps in red ink. This builds long-term memory.";
                    }
                }

                container.innerHTML = `
                    <div class="animate-in slide-in-from-bottom-4 duration-700 space-y-6">
                        <section>
                            <h4 class="text-emerald-400 font-black text-[10px] uppercase tracking-widest mb-2">${typeTitle}</h4>
                            <p class="text-lg font-bold text-white leading-tight">${summary}</p>
                        </section>

                        <div class="h-px bg-white/10"></div>

                        <section>
                            <h4 class="text-indigo-400 font-black text-[10px] uppercase tracking-widest mb-2">Note-Based Growth Strategy</h4>
                            <div class="bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-2xl">
                                <p class="text-slate-300 italic text-sm mb-3">Priority Action Plan:</p>
                                <p class="text-slate-200 leading-relaxed">${studyMethod} <b>Regularly review and update your personal notes for clarity.</b></p>
                            </div>
                        </section>

                        <section>
                            <h4 class="text-amber-400 font-black text-[10px] uppercase tracking-widest mb-2">Spaced Repetition Protocol</h4>
                            <div class="grid grid-cols-3 gap-2 text-center text-[9px] font-black uppercase">
                                <div class="glass p-3 rounded-xl border border-emerald-500/20">Today<br><span class="text-emerald-400">Review Errors</span></div>
                                <div class="glass p-3 rounded-xl border border-indigo-500/20">3 Days Later<br><span class="text-indigo-400">Note Revision</span></div>
                                <div class="glass p-3 rounded-xl border border-amber-500/20">7 Days Later<br><span class="text-amber-400">Re-Test</span></div>
                            </div>
                        </section>

                        <div class="pt-6">
                            <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-600 p-[1px] rounded-2xl shadow-lg shadow-indigo-500/20">
                                <div class="bg-[#020617] rounded-2xl p-5 text-center">
                                    <p class="text-indigo-400 font-serif italic text-xl">"${randomMotive}"</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }, 2000);
        }

        window.closeAIChat = function() {
            document.getElementById('ai-modal').classList.add('hidden');
        }

        async function initResults() {
            try {
                const data = JSON.parse(localStorage.getItem('activeTest'));
                if (!data) return window.location.href = 'dashboard.html';

                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return window.location.href = 'index.html';

                const { data: profile } = await supabase.from('users').select('*').eq('id', user.id).single();

                document.getElementById('user-display-name').innerText = `${profile?.full_name || 'STUDENT'} | CLASS ${profile?.class || 'N/A'}`;
                document.getElementById('student-school').innerText = `School: ${profile?.school_name || 'NOT SET'}`;
                document.getElementById('res-subject-info').innerText = `${data.subject} | ${data.chapter}`;

                document.getElementById('res-score').innerText = data.stats.score;
                document.getElementById('res-correct').innerText = data.stats.correct;
                document.getElementById('res-wrong').innerText = data.stats.wrong;
                
                const accuracy = data.questions.length > 0 ? Math.round((data.stats.correct / data.questions.length) * 100) : 0;
                document.getElementById('res-accuracy').innerText = accuracy + '%';

                const feedbackEl = document.getElementById('performance-feedback');
                if (accuracy === 100) feedbackEl.innerText = "OUTSTANDING";
                else if (accuracy > 90) feedbackEl.innerText = "EXCELLENT";
                else if (accuracy > 80) feedbackEl.innerText = "VERY VERY GOOD";
                else if (accuracy >= 65) feedbackEl.innerText = "GOOD";
                else if (accuracy >= 50) feedbackEl.innerText = "YOU CAN DO BETTER";
                else if (accuracy >= 35) feedbackEl.innerText = "DO MORE PRACTICE";
                else if (accuracy >= 15) feedbackEl.innerText = "GO AND STUDY";
                else if (accuracy >= 5) feedbackEl.innerText = "BETTER LUCK NEXT TIME";

                if (accuracy >= 70) {
                    new Audio('victory.mp3').play().catch(e => console.log("Audio blocked"));
                } else if (accuracy < 30) {
                    new Audio('lose.mp3').play().catch(e => console.log("Audio blocked"));
                }

                if (accuracy === 100) {
                    triggerBalloons(10); 
                    triggerConfetti();
                    triggerCrackers();
                } else if (accuracy > 75) {
                    triggerBalloons(3);
                } else if (accuracy < 5) {
                    triggerCrying();
                }

                renderReview(data);
                document.getElementById('sync-loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');

            } catch (err) {
                console.error("Display Error:", err);
                document.getElementById('sync-loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            }
        }

        function triggerBalloons(count) {
            const layer = document.getElementById('animation-layer');
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-emerald-500', 'bg-purple-500'];
            for(let i = 0; i < count; i++) {
                const b = document.createElement('div');
                b.className = `balloon ${colors[Math.floor(Math.random() * colors.length)]}`;
                b.style.left = (Math.random() * 80 + 10) + '%';
                b.style.animationDelay = (i * 0.3) + 's';
                layer.appendChild(b);
                setTimeout(() => b.remove(), 4000);
            }
        }

        function triggerCrying() {
            const layer = document.getElementById('animation-layer');
            for(let i = 0; i < 10; i++) {
                const e = document.createElement('div');
                e.innerText = '😭';
                e.className = 'crying-emoji';
                e.style.left = (Math.random() * 90) + '%';
                e.style.animationDelay = (Math.random() * 2) + 's';
                layer.appendChild(e);
                setTimeout(() => e.remove(), 4000);
            }
        }

        function triggerConfetti() {
            const layer = document.getElementById('animation-layer');
            const colors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-500', 'bg-emerald-500', 'bg-purple-500', 'bg-pink-500'];
            for(let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = `confetti ${colors[Math.floor(Math.random() * colors.length)]}`;
                c.style.left = (Math.random() * 100) + '%';
                c.style.animationDelay = (Math.random() * 2) + 's';
                layer.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function triggerCrackers() {
            const layer = document.getElementById('animation-layer');
            const flash = document.createElement('div');
            flash.className = 'cracker-flash';
            layer.appendChild(flash);
            setTimeout(() => flash.remove(), 1000);
        }

        function renderReview(data) {
            const container = document.getElementById('review-container');
            const userAnswers = data.userAnswers || {};

            data.questions.forEach((q, idx) => {
                const uAnsLetter = userAnswers[q.id] || null;
                const correctLetter = q.correct_answer.toUpperCase();
                const isCorrect = uAnsLetter === correctLetter;
                
                const correctText = q[`option_${correctLetter.toLowerCase()}`] || "N/A";
                const userSelectedText = uAnsLetter ? (q[`option_${uAnsLetter.toLowerCase()}`] || "N/A") : "Skipped";

                const card = document.createElement('div');
                card.className = `glass p-6 rounded-3xl transition-all ${isCorrect ? 'correct-bg' : 'wrong-bg'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] font-black px-2 py-1 rounded bg-black/30 ${isCorrect ? 'text-emerald-400' : 'text-rose-400'}">
                            ${isCorrect ? '✓ CORRECT' : (uAnsLetter ? '✗ WRONG' : '○ SKIPPED')}
                        </span>
                        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Question ${idx + 1}</span>
                    </div>
                    <p class="text-sm font-semibold mb-4 leading-relaxed">${q.question_text}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div class="bg-black/20 p-3 rounded-xl">
                            <span class="text-[8px] text-slate-500 block mb-1 uppercase font-bold tracking-widest">Your Answer</span>
                            <span class="text-xs ${isCorrect ? 'text-emerald-400' : 'text-rose-400'} font-bold">
                                (${uAnsLetter || '-'}) ${userSelectedText}
                            </span>
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl border border-emerald-500/10">
                            <span class="text-[8px] text-slate-500 block mb-1 uppercase font-bold tracking-widest">Correct Solution</span>
                            <span class="text-xs text-emerald-400 font-bold">
                                (${correctLetter}) ${correctText}
                            </span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = initResults;
    </script>
</body>
</html>
